<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Schedule &amp; Metrics</title>
<style>
:root{
  --bg:#f4f6f9; --card:#ffffff; --ink:#1a2433; --muted:#64748b; --line:#e2e8f0;
  --accent:#2563eb; --accent-soft:#eff6ff;
  --open:#b45309; --open-bg:#fef3c7;
  --pl:#7c3aed; --pl-bg:#f3e8ff;
  --soc:#0369a1; --soc-bg:#e0f2fe;
  --off:#94a3b8; --off-bg:#f1f5f9;
  --pto:#0f766e; --pto-bg:#ccfbf1;
  --tr:#9d174d; --tr-bg:#fce7f3;
  --good:#15803d; --bad:#b91c1c;
}
*{box-sizing:border-box}
body{margin:0;font-family:"Segoe UI",system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
button{font:inherit;cursor:pointer}
select,input{font:inherit}
.hdr{background:#0f2444;color:#fff;padding:10px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:50}
.hdr h1{font-size:17px;margin:0;font-weight:600;letter-spacing:.3px}
.hdr .sub{font-size:11px;color:#9fb3d1;margin-top:1px}
.hdr select{background:#1b3a66;color:#fff;border:1px solid #2e4f80;border-radius:6px;padding:6px 8px}
.hdr .spacer{flex:1}
.btn{border:1px solid var(--line);background:#fff;border-radius:6px;padding:6px 12px;color:var(--ink)}
.btn:hover{background:#f8fafc}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:#1d4ed8}
.btn.ghost{background:#1b3a66;border-color:#2e4f80;color:#fff}
.btn.ghost:hover{background:#24497d}
.btn.danger{color:var(--bad);border-color:#fecaca}
.btn.sm{padding:3px 8px;font-size:12px}
.tabs{display:flex;gap:2px;background:#0f2444;padding:0 20px}
.tabs button{background:transparent;border:none;color:#9fb3d1;padding:9px 16px;border-radius:8px 8px 0 0;font-size:13.5px}
.tabs button.on{background:var(--bg);color:var(--ink);font-weight:600}
main{padding:18px 20px 60px;max-width:1650px;margin:0 auto}
.grid-units{display:grid;grid-template-columns:repeat(auto-fill,minmax(720px,1fr));gap:14px}
.ucard{background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.ucard h3{margin:0;padding:8px 12px;background:#f8fafc;border-bottom:1px solid var(--line);font-size:14px;display:flex;gap:8px;align-items:center}
.ucard h3 .tag{font-size:10.5px;background:var(--accent-soft);color:var(--accent);border-radius:10px;padding:1px 8px;font-weight:600}
table.sched{width:100%;border-collapse:collapse;table-layout:fixed}
table.sched th,table.sched td{border:1px solid var(--line);padding:0;font-size:12px;text-align:center;vertical-align:top}
table.sched th{background:#fbfcfe;padding:4px 2px;font-weight:600;color:var(--muted)}
table.sched th .d{color:var(--ink)}
table.sched td.time{background:#fbfcfe;font-size:11px;color:var(--muted);width:64px;padding:4px 2px;vertical-align:middle}
.slot{min-height:26px;padding:3px 4px;cursor:pointer;line-height:1.25;border-bottom:1px dashed #eef2f7}
.slot:last-child{border-bottom:none}
.slot:hover{background:var(--accent-soft)}
.slot .nm{font-weight:600;font-size:11.5px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot .nm.empty{color:#c3ccd9;font-weight:400}
.slot .as{display:inline-block;font-size:9.5px;border-radius:8px;padding:0 6px;margin-top:1px;font-weight:600}
.a-open{color:var(--open);background:var(--open-bg)}
.a-pl{color:var(--pl);background:var(--pl-bg)}
.a-soc{color:var(--soc);background:var(--soc-bg)}
.a-oth{color:#334155;background:#e2e8f0}
.a-pto{color:var(--pto);background:var(--pto-bg)}
.a-tr{color:var(--tr);background:var(--tr-bg)}
.nm.openName{color:var(--open)}
.nm.dupe{color:var(--bad);font-weight:800}
.slot.conflict{background:#fef2f2}
.slot.conflict:hover{background:#fee2e2}
td.dupe{color:var(--bad)!important;font-weight:800;background:#fef2f2!important}
.conflict-banner{background:#fef2f2;border:1px solid #fecaca;color:var(--bad);padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:12.5px;font-weight:600;line-height:1.6}
.conflict-banner b{font-weight:800}
table.sched tr.sh0>td{background:#fffdf0}
table.sched tr.sh1>td{background:#f2f8ff}
table.sched tr.sh2>td{background:#f7f5ff}
table.sched tr.sh0>td.time{background:#faf3d3}
table.sched tr.sh1>td.time{background:#e2eefc}
table.sched tr.sh2>td.time{background:#eae5fa}
table.sched tr.shrow>td{border-top:2px solid #c7d2e0}
table.sched td.time{cursor:pointer}
table.sched td.time:hover{outline:2px solid var(--accent);outline-offset:-2px}
.slot .tm{display:block;font-size:9px;color:#5b6b80;font-weight:600;margin-top:1px}
.slot .tm.nonstandard{color:var(--bad)}
.popover input[type=time]{flex:1;width:100%;padding:4px;border:1px solid var(--line);border-radius:6px}
.popover{position:absolute;z-index:100;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 30px rgba(15,36,68,.18);padding:12px;width:240px}
.popover label{display:block;font-size:11px;color:var(--muted);margin:6px 0 2px;font-weight:600}
.popover select{width:100%;padding:5px;border:1px solid var(--line);border-radius:6px}
.popover .row{display:flex;gap:8px;margin-top:10px}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:16px}
.card h2{margin:0 0 12px;font-size:16px}
.card h2 small{color:var(--muted);font-weight:400;font-size:12px;margin-left:8px}
table.plain{width:100%;border-collapse:collapse;font-size:13px}
table.plain th,table.plain td{border:1px solid var(--line);padding:5px 8px;text-align:left}
table.plain th{background:#f8fafc;font-weight:600;position:sticky;top:96px}
table.plain input,table.plain select{width:100%;border:1px solid transparent;background:transparent;padding:3px;border-radius:4px}
table.plain input:focus,table.plain select:focus{border-color:var(--accent);background:#fff;outline:none}
.daily-wrap{overflow:auto;max-height:70vh;border:1px solid var(--line);border-radius:8px}
table.daily{border-collapse:collapse;font-size:12.5px;width:100%}
table.daily th,table.daily td{border:1px solid var(--line);padding:4px 8px;white-space:nowrap}
table.daily th{background:#f8fafc;position:sticky;top:0;z-index:2}
table.daily td:first-child,table.daily th:first-child{position:sticky;left:0;background:#fff;font-weight:600;z-index:1}
table.daily th:first-child{background:#f8fafc;z-index:3}
td.cOFF{color:var(--off);background:var(--off-bg)}
td.cOPEN{color:var(--open);background:var(--open-bg);font-weight:600}
td.cPL{color:var(--pl);background:var(--pl-bg);font-weight:600}
td.cSOC{color:var(--soc);background:var(--soc-bg)}
.daychips{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.daychips button{border:1px solid var(--line);background:#fff;border-radius:16px;padding:5px 14px}
.daychips button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.dayboard{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.shiftcol{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px}
.shiftcol h4{margin:0 0 8px;font-size:13px;color:var(--muted)}
.shiftcol .ent{display:flex;justify-content:space-between;font-size:12.5px;padding:2.5px 4px;border-radius:4px}
.shiftcol .ent:nth-child(even){background:#f8fafc}
.shiftcol .ent b{font-weight:600}
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:10px}
.mrow{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:8px 12px;gap:8px}
.mrow .lbl{font-size:12.5px}
.mrow .val{font-weight:700;font-size:15px;text-align:right}
.mrow input{width:90px;text-align:right;border:1px solid var(--line);border-radius:6px;padding:4px 6px;font-weight:700}
.badge{font-size:9.5px;border-radius:8px;padding:1px 7px;font-weight:700;letter-spacing:.4px}
.b-auto{background:#dcfce7;color:var(--good)}
.b-man{background:#fee2e2;color:var(--bad)}
.b-calc{background:var(--accent-soft);color:var(--accent)}
.ovr{font-size:10px;color:var(--accent);cursor:pointer;text-decoration:underline;white-space:nowrap}
.hist-wrap{overflow:auto;border:1px solid var(--line);border-radius:8px;max-height:60vh}
table.hist{border-collapse:collapse;font-size:11.5px;white-space:nowrap}
table.hist th,table.hist td{border:1px solid var(--line);padding:3px 7px;text-align:right}
table.hist th{background:#f8fafc;position:sticky;top:0}
table.hist td:first-child,table.hist th:first-child{text-align:left;position:sticky;left:0;background:#fff}
table.hist th:first-child{background:#f8fafc;z-index:2}
table.hist.ot td.otHot{color:var(--bad);font-weight:800}
table.hist.ot tr.posttotals td{background:#f1f5f9;font-weight:800}
tr.appweek td{background:#f0f9ff}
.arch-item{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:8px;padding:10px 14px;margin-bottom:8px;background:var(--card)}
.arch-item .rng{font-weight:700;min-width:190px}
.arch-item .meta{color:var(--muted);font-size:12px;flex:1}
.modal-bg{position:fixed;inset:0;background:rgba(15,36,68,.45);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:12px;padding:20px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal h3{margin:0 0 14px}
.modal label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin:10px 0 4px}
.modal input,.modal select{width:100%;padding:7px;border:1px solid var(--line);border-radius:6px}
.modal .row{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.note{font-size:12px;color:var(--muted);margin:6px 0 14px}
.settings-units td input{width:70px}
.legend{display:flex;gap:14px;font-size:11.5px;color:var(--muted);margin:10px 0;flex-wrap:wrap;align-items:center}
.legend .as{font-size:10px}
#printArea{display:none}
@media print{
  @page{size:portrait;margin:9mm}
  body{background:#fff}
  .hdr,.tabs,main{display:none !important}
  #printArea{display:block}
  .ppage{page-break-after:always}
  .ppage:last-child{page-break-after:auto}
  .ppage h2{font-size:13pt;margin:0 0 6px;display:flex;justify-content:space-between;align-items:baseline;font-weight:700}
  .ppage h2 span{font-weight:400;font-size:9pt;color:#444}
  table.ptbl{width:100%;border-collapse:collapse;margin-bottom:9px;table-layout:fixed;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  table.ptbl td,table.ptbl th{border:1px solid #555;line-height:1.2;overflow:hidden}
  table.ptbl td.ptitle{background:#dde5ee;font-weight:700;font-size:9pt;text-align:left;padding:2px 6px;letter-spacing:.3px}
  table.ptbl th{background:#f0f2f5;font-size:7.5pt;padding:1px 2px;font-weight:700;text-align:center}
  table.ptbl th .pdt{font-weight:400;font-size:6.5pt;color:#333}
  table.ptbl th.plbl,table.ptbl td.plbl{width:34px;background:#f0f2f5;font-size:7pt;font-weight:700;text-align:center;vertical-align:middle}
  table.ptbl td.ptm{font-size:6.5pt;color:#222;text-align:center;padding:0 1px;height:9px}
  table.ptbl td.ptm.nonstandard{color:#991b1b;font-weight:700;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  table.ptbl td.pnm{font-size:8pt;font-weight:600;text-align:center;padding:1px 2px;height:13px;white-space:nowrap}
  table.ptbl td.pnm i{font-style:normal;font-weight:400;font-size:6.5pt;color:#444}
  table.ptbl td.pnm.op{color:#92400e;background:#fef3c7}
  table.ptbl tr.psh0 td.ptm{background:#fdf9e7}
  table.ptbl tr.psh1 td.ptm{background:#eef4fd}
  table.ptbl tr.psh2 td.ptm{background:#f1eefb}
  table.ptbl tr.psh0 td.plbl{background:#f7f0cf}
  table.ptbl tr.psh1 td.plbl{background:#dcebfb}
  table.ptbl tr.psh2 td.plbl{background:#e5def7}
}
</style>
</head>

/* ---------- state ---------- */
let state = null;

let dupeInfo = {};

function unitLabel(u){ return /^\d/.test(u.id) ? 'Unit '+u.id : u.id; }
function unitGrid(w,u){
  if(!w.schedule[u.id]) w.schedule[u.id] = [0,1,2].map(()=>DAYS.map(()=>Array.from({length:SLOTS_PER},()=>({emp:'',assign:''}))));
  return w.schedule[u.id];
}
function lastSaturday(d){
  const x = new Date(d); x.setHours(0,0,0,0);
  while(x.getDay()!==6) x.setDate(x.getDate()-1);
  return x;
}
function isoDate(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function parseISO(s){ const [y,m,dd]=s.split('-').map(Number); return new Date(y,m-1,dd); }
function fmtRange(weekKey){
  const s = parseISO(weekKey), e = new Date(s); e.setDate(e.getDate()+6);
  const f = d => String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+'-'+String(d.getFullYear()).slice(2);
  return f(s)+' to '+f(e);
}
function dayDate(weekKey,i){ const d=parseISO(weekKey); d.setDate(d.getDate()+i); return (d.getMonth()+1)+'/'+d.getDate(); }

function blankWeekSchedule(){
  const sched = {};
  state.units.forEach(u=>{ sched[u.id] = [0,1,2].map(()=>DAYS.map(()=>Array.from({length:SLOTS_PER},()=>({emp:'',assign:''})))); });
  return sched;
}
function freshUnits(){ return JSON.parse(JSON.stringify(SEED.units)); }
function freshEmployees(){ return SEED.employees.map((e,i)=>({ id:'e'+(i+1), name:e.name, unit:e.unit, building:e.building, desc:e.desc, active:true })); }
function seededWeek(){ return { schedule: JSON.parse(JSON.stringify(SEED.schedule)), metrics:{}, createdAt:new Date().toISOString() }; }
function buildInitialState(){
  const st = {
    units: freshUnits(),
    employees: freshEmployees(),
    weeks:{},
    currentWeek: SEED.weekKey,
    settings:{ totalPostHours:2480, callInNatAvg:0.032 },
    printPages: JSON.parse(JSON.stringify(SEED.printPages)),

  };
  st.weeks[SEED.weekKey] = seededWeek();
  return st;
}
function migrate(){
  // upgrade pre-print-layout saves: refresh units/roster to the current master file,
  // keep saved weeks, metrics and settings, and add the new seeded week
  if(state.printPages) return;
  state.units = freshUnits();
  state.employees = freshEmployees();
  state.printPages = JSON.parse(JSON.stringify(SEED.printPages));
  if(!state.weeks[SEED.weekKey]) state.weeks[SEED.weekKey] = seededWeek();
  state.currentWeek = SEED.weekKey;
  persist();
}
function load(){
  try{ const raw = localStorage.getItem(LS_KEY); if(raw){ state = JSON.parse(raw); migrate(); return; } }catch(e){}
  state = buildInitialState();
  persist();
}
function persist(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }

/* ---------- helpers ---------- */
function week(){ return state.weeks[state.currentWeek]; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function shiftHours(u,si){
  const [sh,sm]=u.shifts[si].start.split(':').map(Number), [eh,em]=u.shifts[si].end.split(':').map(Number);
  let h = (eh+em/60)-(sh+sm/60); if(h<=0) h+=24; return h;
}
function slotHours(u,si,sl){
  if(sl && sl.start && sl.end){
    const [sh,sm]=sl.start.split(':').map(Number), [eh,em]=sl.end.split(':').map(Number);
    let h=(eh+em/60)-(sh+sm/60); if(h<=0) h+=24; return h;
  }
  return shiftHours(u,si);
}
function assignClass(a, unit){
  if(!a) return '';
  if(a==='OPEN') return 'a-open';
  if(a==='PL') return 'a-pl';
  if(a==='PTO') return 'a-pto';
  if(a==='SOC') return 'a-soc';
  if(a==='TR') return 'a-tr';
  if(unit && a===unit.homeAssign) return '';
  return 'a-oth';
}
function assignOptions(){
  const opts = new Set();
  state.units.forEach(u=>opts.add(u.homeAssign));
  ['Unit SRO','SOC','PL','OPEN','PTO','TR'].forEach(o=>opts.add(o));
  return [...opts].sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));
}
function activeEmployees(){ return state.employees.filter(e=>e.active).sort((a,b)=>a.name.localeCompare(b.name)); }
function fmtNum(v){ if(v==null||isNaN(v)) return '—'; return (+v).toLocaleString(undefined,{maximumFractionDigits:2}); }
function fmtPct(v){ if(v==null||isNaN(v)) return '—'; return (v*100).toFixed(2)+'%'; }

function computeAuto(weekKey){

          shifts++; hrsWorked+=h;
          if(asg==='Unit SRO') sro+=h;
          let g='';
          if(unitByNum[asg]) g = unitByNum[asg].group;
          else if(asg==='SOC') g = 'HQ';
          if(grpHrs[g]!=null) grpHrs[g]+=h;
        }
      });
    }
  });
  const m = wk.metrics||{};
  const ovr = m.ovr||{};
  const val = (k,auto)=> (ovr[k]!=null && ovr[k]!=='') ? +ovr[k] : auto;
  const totalHrsWorked = val('totalHrsWorked', hrsWorked);
  const openH = val('openHrs', openHrs);
  const plH = val('pipelineHrs', plHrs);
  const scheduledShifts = val('scheduledShifts', shifts);
  const hrsShort = openH + plH;
  const sroAvail = (m.sroAvail!=null && m.sroAvail!=='') ? +m.sroAvail : sro;
  const nbot = +m.nbotHours||0, callIns = +m.callIns||0, dark = +m.darkPostHrs||0;
  const callInHrs = (m.callInHrs!=null&&m.callInHrs!=='')?+m.callInHrs:callIns*8;
  const daysOff = +m.schedDaysOff||0;
  const tph = +state.settings.totalPostHours||2480;
  const nbotPctRaw = totalHrsWorked? nbot/totalHrsWorked:0;
  const totalHrsShortRaw = hrsShort;
  const workforceShortageRaw = hrsShort - sroAvail;
  const schedHrsOffRaw = daysOff*8;
  const darkPostPctRaw = dark/tph;
  const shiftCoveragePctRaw = 1 - dark/tph;
  const callInPctRaw = scheduledShifts? callIns/scheduledShifts:0;
  const callInNatAvgRaw = +state.settings.callInNatAvg||0.032;
  return {
    totalHrsWorked, nbotHours:nbot, nbotPct: val('nbotPct', nbotPctRaw),
    pipelineHrs:plH, openHrs:openH, totalHrsShort: val('totalHrsShort', totalHrsShortRaw),
    sroAvail, workforceShortage: val('workforceShortage', workforceShortageRaw),
    callIns, callInHrs, schedDaysOff:daysOff, schedHrsOff: val('schedHrsOff', schedHrsOffRaw),
    scheduledShifts, darkPostHrs:dark, darkPostPct: val('darkPostPct', darkPostPctRaw), shiftCoveragePct: val('shiftCoveragePct', shiftCoveragePctRaw),
    callInPct: val('callInPct', callInPctRaw), callInNatAvg: val('callInNatAvg', callInNatAvgRaw),
    h4Hrs:val('h4Hrs',grpHrs.H4), hqHrs:val('hqHrs',grpHrs.HQ), ncHrs:val('ncHrs',grpHrs.NC),
    h4Nbot:+m.h4Nbot||0, hqNbot:+m.hqNbot||0, ncNbot:+m.ncNbot||0,

  };
}

/* ---------- duplicate / conflict detection ---------- */
function computeDupeInfo(weekKey){
  // per day, count how many non-empty, non-OPEN slots each employee name occupies across all units/shifts
  const dupe = DAYS.map(()=>({}));
  const wk = state.weeks[weekKey];
  if(!wk) return dupe;
  state.units.forEach(u=>{
    const grid = unitGrid(wk,u);
    for(let si=0;si<3;si++) for(let di=0;di<7;di++){
      grid[si][di].forEach(sl=>{
        const nm = (sl.emp||'').trim();
        if(!nm || /^OPEN/i.test(nm)) return;
        dupe[di][nm] = (dupe[di][nm]||0)+1;
      });
    }
  });
  return dupe;
}
function conflictsList(){
  const out = [];
  DAYS.forEach((d,di)=>{
    Object.entries(dupeInfo[di]||{}).forEach(([nm,c])=>{ if(c>1) out.push({day:d, di, name:nm, count:c}); });
  });
  return out;
}
function conflictBannerHTML(){
  const conflicts = conflictsList();
  if(!conflicts.length) return '';
  return `<div class="conflict-banner">&#9888; <b>Scheduling conflict${conflicts.length>1?'s':''} detected:</b> ${conflicts.map(c=>`<b>${esc(c.name)}</b> appears ${c.count}&times; on ${esc(c.day)}`).join(' &middot; ')}</div>`;
}

function slotHTML(u, ui_, si, di, k){
  const sl = unitGrid(week(),u)[si][di][k];
  const isOpen = /^OPEN/i.test(sl.emp||'');
  const nmTrim = (sl.emp||'').trim();
  const isDupe = !!(nmTrim && !isOpen && dupeInfo[di] && dupeInfo[di][nmTrim] > 1);
  const dupeTitle = isDupe ? ` title="${esc(nmTrim)} is scheduled ${dupeInfo[di][nmTrim]}\u00d7 on ${DAYS[di]} \u2014 possible double-booking"` : '';
  const nm = sl.emp ? `<span class="nm ${isOpen?'openName':''} ${isDupe?'dupe':''}"${dupeTitle}>${esc(sl.emp)}${isDupe?' \u26a0':''}</span>` : `<span class="nm empty">&mdash;</span>`;
  const cls = assignClass(sl.assign, u);
  const as = sl.assign && cls ? `<span class="as ${cls}">${esc(sl.assign)}</span>` : '';
  const hasNonStandard = !!(sl.start||sl.end);
  const tm = hasNonStandard ? `<span class="tm nonstandard">${esc(sl.start||u.shifts[si].start)}&ndash;${esc(sl.end||u.shifts[si].end)}</span>` : '';
  return `<div class="slot ${isDupe?'conflict':''}" data-u="${ui_}" data-s="${si}" data-d="${di}" data-k="${k}">${nm}${as}${tm}</div>`;
}

function computeOT(weekKey){
  const wk = state.weeks[weekKey];
  const units = state.units;
  const emps = activeEmployees();
  const rows = emps.map(e=>({name:e.name, unitHours:{}, other:0, pto:0, tr:0, total:0, ot:0}));
  const byName = {}; rows.forEach(r=>byName[r.name]=r);
  const postTotals = {}; units.forEach(u=>postTotals[u.id]=0);
  let ptoTotal=0, trTotal=0, otherTotal=0;
  const unitByAssign = {};
  units.forEach(u=>{
    unitByAssign[u.homeAssign] = u;
    if(/^\d/.test(u.id)) unitByAssign['Unit '+u.id] = unitByAssign['Unit '+u.id]||u;
    else unitByAssign['Unit '+u.homeAssign] = unitByAssign['Unit '+u.homeAssign]||u;
  });
  units.forEach(u=>{
    for(let si=0;si<3;si++) for(let di=0;di<7;di++){
      unitGrid(wk,u)[si][di].forEach(sl=>{
        if(!sl.emp) return;
        const nm = sl.emp.trim();
        if(!nm) return;
        const hrs = slotHours(u,si,sl);
        const assignRaw = (sl.assign||'').trim();
        let bucket, targetUnit=null;
        if(/pto/i.test(assignRaw)) bucket='pto';
        else if(/\btr\b/i.test(assignRaw) || /training/i.test(assignRaw)) bucket='tr';
        else {
          targetUnit = assignRaw ? unitByAssign[assignRaw] : u;
          bucket = targetUnit ? 'unit' : 'other';
        }
        if(bucket==='pto') ptoTotal += hrs;
        else if(bucket==='tr') trTotal += hrs;
        else if(bucket==='unit') postTotals[targetUnit.id] += hrs;
        else otherTotal += hrs;
        const isOpenNm = /^OPEN/i.test(nm);
        const r = byName[nm];
        if(r && !isOpenNm){
          if(bucket==='pto') r.pto += hrs;
          else if(bucket==='tr') r.tr += hrs;
          else if(bucket==='unit') r.unitHours[targetUnit.id] = (r.unitHours[targetUnit.id]||0) + hrs;
          else r.other += hrs;
        }
      });
    }
  });
  rows.forEach(r=>{
    const unitSum = units.reduce((s,u)=>s+(r.unitHours[u.id]||0),0);
    r.total = unitSum + r.pto + r.tr + r.other;
    const otEligible = r.total - r.pto;
    r.ot = otEligible<=40 ? 0 : otEligible-40;
  });
  const grandTotal = units.reduce((s,u)=>s+postTotals[u.id],0) + ptoTotal + trTotal + otherTotal;
  const totalOT = rows.reduce((s,r)=>s+r.ot,0);
  const otBase = grandTotal - ptoTotal;
  return {rows, postTotals, ptoTotal, trTotal, otherTotal, grandTotal, totalOT, otPct: otBase? totalOT/otBase : 0};
}

  });
  const rows = [];

    if(appRanges[rng]){ rows.push(appRanges[rng]); delete appRanges[rng]; return; }
    rows.push({range:rng, app:false,
      hrs:h['Total Hrs Worked'], nbot:h['Total NBOT Hours'], nbotPct:h['NBOT %'], pl:h['Pipeline Hrs'], open:h['OPEN Hrs'],
      short:h['Total Hrs Short'], sro:h['SRO Hours Available'], shortage:h['Workforce Shortage'], callIns:h['Call Ins'],
      callInHrs:h['Call In Hrs'], callInPct:h['Call In %'], daysOff:h['Scheduled Days Off'], hrsOff:h['Scheduled Hrs Off'],
      shifts:h['Scheduled Shifts'], dark:h['Dark Post Hrs'], darkPct:h['Dark Post %'], cov:h['Shift Coverage %'],
      h4:h['H4 Hrs'], h4n:h['H4 NBOT'], hq:h['HQ Hrs'], hqn:h['HQ NBOT'], nc:h['NC Hrs'], ncn:h['NC NBOT']});
  });
  Object.values(appRanges).forEach(r=>rows.push(r));
  const key = r=>{ const [mm,dd,yy]=r.range.split(' to ')[0].split('-').map(Number); return (2000+yy)*10000+mm*100+dd; };
  rows.sort((x,y)=>key(x)-key(y));
  return rows;
}

/* ---------- print ---------- */
function fmtT(t){ if(!t) return ''; const p=t.split(':'); return (+p[0])+':'+p[1]; }
function printNameCell(sl, u){
  if(!sl || (!sl.emp && !sl.assign)) return `<td class="pnm"></td>`;
  const open = /^OPEN/i.test(sl.emp) || sl.assign==='OPEN';
  const extra = sl.assign && sl.assign!==u.homeAssign ? ` <i>(${esc(sl.assign)})</i>` : '';
  return `<td class="pnm ${open?'op':''}">${esc(sl.emp||sl.assign)}${extra}</td>`;
}
function buildPrint(){
  const wk = state.currentWeek, w = week();
  const byId = {}; state.units.forEach(u=>byId[u.id]=u);
  const pages = (state.printPages||[]).map(p=>({header:p.header, units:p.units.map(id=>byId[id]).filter(Boolean)})).filter(p=>p.units.length);
  let html='';
  pages.forEach((pg,pi)=>{
    html += `<div class="ppage"><h2>${esc(pg.header)} <span>${fmtRange(wk)} &middot; Page ${pi+1} of ${pages.length}</span></h2>`;
    pg.units.forEach(u=>{
      const grid = unitGrid(w,u);
      html += `<table class="ptbl">
        <tr><td class="ptitle" colspan="8">${esc(unitLabel(u))}${u.title?' &mdash; '+esc(u.title):''}</td></tr>
        <tr><th class="plbl"></th>${DAYS.map((d,i)=>`<th>${d}<br><span class="pdt">${dayDate(wk,i)}</span></th>`).join('')}</tr>`;
      for(let si=0;si<3;si++){
        const slot2has = grid[si].some(day=>day[1] && (day[1].emp||day[1].assign));
        html += `<tr class="psh${si}"><td class="plbl" rowspan="${slot2has?4:2}">${SHIFT_NAMES[si]}</td>`;
        for(let di=0;di<7;di++){
          const sl = grid[si][di][0];
          const isNonStd = !!(sl.start||sl.end);
          html += `<td class="ptm${isNonStd?' nonstandard':''}">${fmtT(sl.start||u.shifts[si].start)}&ndash;${fmtT(sl.end||u.shifts[si].end)}</td>`;
        }
        html += `</tr><tr class="psh${si}">`;
        for(let di=0;di<7;di++) html += printNameCell(grid[si][di][0], u);
        html += `</tr>`;
        if(slot2has){
          html += `<tr class="psh${si}">`;
          for(let di=0;di<7;di++){
            const sl = grid[si][di][1], has = sl && (sl.emp||sl.assign);
            const isNonStd = has && !!(sl.start||sl.end);
            html += `<td class="ptm${isNonStd?' nonstandard':''}">${has?fmtT(sl.start||u.shifts[si].start)+'&ndash;'+fmtT(sl.end||u.shifts[si].end):''}</td>`;
          }
          html += `</tr><tr class="psh${si}">`;
          for(let di=0;di<7;di++) html += printNameCell(grid[si][di][1], u);
          html += `</tr>`;
        }
      }
      html += `</table>`;
    });
    html += `</div>`;
  });
  document.getElementById('printArea').innerHTML = html;
}

function openSlotEditor(elm){
  closePop();

    <div style="font-size:10px;color:var(--muted);margin-top:3px">Shift default: ${esc(u.shifts[si].start)}&ndash;${esc(u.shifts[si].end)}${(sl.start||sl.end)?' &middot; <span class="ovr" id="popTmReset">use default</span>':''}</div>
    <label>Copy / Paste</label>
    <div class="row" style="margin-top:0">
      <button class="btn sm" id="popCopy" ${(sl.emp||sl.assign)?'':'disabled'}>&#128203; Copy</button>
      <button class="btn sm" id="popPaste" ${slotClipboard?'':'disabled'}>&#128190; Paste</button>
      <span style="flex:1"></span>
    </div>
    <div style="font-size:10px;color:var(--muted);margin:2px 0 4px" id="popClipInfo">${slotClipboard?('Clipboard: <b>'+esc(slotClipboard.emp||'(blank)')+'</b>'+(slotClipboard.assign?' &middot; '+esc(slotClipboard.assign):'')):'Clipboard empty'}</div>
    <div class="row"><button class="btn sm danger" id="popClear">Clear</button><span style="flex:1"></span>
    <button class="btn sm" id="popCancel">Cancel</button><button class="btn sm primary" id="popSave">Save</button></div>`;
  document.body.appendChild(pop);
  const r = elm.getBoundingClientRect();
  let top = r.bottom + window.scrollY + 4, left = Math.min(r.left + window.scrollX, window.scrollX + document.documentElement.clientWidth - 260);
  if(r.bottom + 260 > window.innerHeight) top = r.top + window.scrollY - pop.offsetHeight - 6;
  pop.style.top = top+'px'; pop.style.left = left+'px';
  const empSel = pop.querySelector('#popEmp'), asgSel = pop.querySelector('#popAsg');
  empSel.addEventListener('change', ()=>{ if(empSel.value && !asgSel.value) asgSel.value = u.homeAssign; });
  pop.querySelector('#popSave').onclick = ()=>{
    sl.emp=empSel.value; sl.assign=asgSel.value;
    const st=pop.querySelector('#popStart').value, en=pop.querySelector('#popEnd').value;
    if(st && en && (st!==u.shifts[si].start || en!==u.shifts[si].end)){ sl.start=st; sl.end=en; }
    else { delete sl.start; delete sl.end; }
    persist(); closePop(); render(); };
  pop.querySelector('#popClear').onclick = ()=>{ sl.emp=''; sl.assign=''; delete sl.start; delete sl.end; persist(); closePop(); render(); };
  pop.querySelector('#popCancel').onclick = closePop;
  pop.querySelector('#popCopy').onclick = ()=>{
    slotClipboard = { emp: empSel.value, assign: asgSel.value, start: pop.querySelector('#popStart').value, end: pop.querySelector('#popEnd').value };
    const btn = pop.querySelector('#popCopy'); const orig = btn.textContent; btn.textContent='Copied!';
    pop.querySelector('#popPaste').disabled = false;
    pop.querySelector('#popClipInfo').innerHTML = 'Clipboard: <b>'+esc(slotClipboard.emp||'(blank)')+'</b>'+(slotClipboard.assign?' &middot; '+esc(slotClipboard.assign):'');
    setTimeout(()=>{ if(btn.isConnected) btn.textContent=orig; }, 900);
  };
  pop.querySelector('#popPaste').onclick = ()=>{
    if(!slotClipboard) return;
    empSel.value = slotClipboard.emp||'';
    if(slotClipboard.assign && ![...asgSel.options].some(o=>o.value===slotClipboard.assign)){
      const opt=document.createElement('option'); opt.value=slotClipboard.assign; opt.textContent=slotClipboard.assign; asgSel.appendChild(opt);
    }
    asgSel.value = slotClipboard.assign||'';
    pop.querySelector('#popStart').value = slotClipboard.start || u.shifts[si].start;
    pop.querySelector('#popEnd').value = slotClipboard.end || u.shifts[si].end;
    pop.querySelector('#popCopy').disabled = !(empSel.value||asgSel.value);
  };
  const tmReset = pop.querySelector('#popTmReset');
  if(tmReset) tmReset.onclick = ()=>{ delete sl.start; delete sl.end; persist(); closePop(); render(); };
  empSel.focus();
}

/* ---------- modal: new week ---------- */
function openNewWeekModal(copyFrom){
  const bg = document.createElement('div'); bg.className='modal-bg';
  const next = isoDate(lastSaturday(new Date(Date.now()+7*86400000)));
  const keys = Object.keys(state.weeks).sort().reverse();
  bg.innerHTML = `<div class="modal"><h3>New Week</h3>
    <label>Week starting (Saturday)</label><input type="date" id="nwDate" value="${next}">
    <label>Start from</label>
    <select id="nwCopy">
      <option value="__blank">Blank schedule</option>
      ${keys.map(k=>`<option value="${k}" ${copyFrom===k?'selected':''}>Copy of ${fmtRange(k)}</option>`).join('')}
    </select>
    <div class="row"><button class="btn" id="nwCancel">Cancel</button><button class="btn primary" id="nwOk">Create</button></div></div>`;
  document.body.appendChild(bg);
  if(!copyFrom && keys.length) bg.querySelector('#nwCopy').value = keys[0];
  bg.querySelector('#nwCancel').onclick = ()=>bg.remove();
  bg.addEventListener('click', e=>{ if(e.target===bg) bg.remove(); });
  bg.querySelector('#nwOk').onclick = ()=>{
    let d = bg.querySelector('#nwDate').value;
    if(!d) return;
    d = isoDate(lastSaturday(parseISO(d).getTime()+0 ? parseISO(d) : new Date()));
    if(state.weeks[d]){ alert('A week starting '+fmtRange(d)+' already exists.'); return; }
    const src = bg.querySelector('#nwCopy').value;
    const wk = { metrics:{}, createdAt:new Date().toISOString() };
    wk.schedule = src==='__blank' ? blankWeekSchedule() : JSON.parse(JSON.stringify(state.weeks[src].schedule));
    state.weeks[d]=wk; state.currentWeek=d; persist();
    bg.remove(); ui.tab='schedule'; render();
  };
}

/* ---------- downloads ---------- */
function download(name, text, type){
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text],{type:type||'application/json'}));
  a.download = name; a.click(); URL.revokeObjectURL(a.href);
}
function exportCsv(){
  const cols = ['Date Range','Hrs Worked','NBOT Hrs','NBOT %','Pipeline','OPEN','Hrs Short','SRO Avail','Shortage','Call Ins','Call In Hrs','Call In %','Days Off','Hrs Off','Shifts','Dark Hrs','Dark %','Coverage %','H4 Hrs','H4 NBOT','HQ Hrs','HQ NBOT','NC Hrs','NC NBOT'];
  const lines=[cols.join(',')];
  historyRows().forEach(r=>{
    lines.push([`"${r.range}"`,r.hrs,r.nbot,r.nbotPct,r.pl,r.open,r.short,r.sro,r.shortage,r.callIns,r.callInHrs,r.callInPct,r.daysOff,r.hrsOff,r.shifts,r.dark,r.darkPct,r.cov,r.h4,r.h4n,r.hq,r.hqn,r.nc,r.ncn]
      .map(v=>v==null?'':v).join(','));
  });
  download('weekly-metrics.csv', lines.join('\n'), 'text/csv');
}

/* ---------- events ---------- */
document.addEventListener('click', e=>{
  const t = e.target.closest('[data-tab],[data-day],[data-tu],.slot,[data-del-emp],#btnAddEmp,[data-load-week],[data-dup-week],[data-del-week],[data-export-week],#btnExportAll,#btnImport,#btnNewWeek,#btnPrint,#btnCsv,#btnReset,[data-ovr-edit],[data-ovr-reset]');
  if(!t){ if(pop && !e.target.closest('.popover')) closePop(); return; }
  if(t.dataset.tab){ ui.tab=t.dataset.tab; closePop(); render(); }
  else if(t.dataset.day!=null){ ui.day=+t.dataset.day; render(); }
  else if(t.dataset.tu!=null){ openShiftTimeEditor(t); }
  else if(t.classList.contains('slot')){ openSlotEditor(t); }
  else if(t.id==='btnAddEmp'){ state.employees.push({id:'e'+Date.now(),name:'New Employee',unit:'',building:'',desc:'',active:true}); persist(); render(); }
  else if(t.dataset.delEmp!=null){ const emp=state.employees[+t.dataset.delEmp]; if(confirm('Delete '+emp.name+'? Existing schedule entries keep the name text.')){ state.employees.splice(+t.dataset.delEmp,1); persist(); render(); } }
  else if(t.dataset.loadWeek){ state.currentWeek=t.dataset.loadWeek; persist(); ui.tab='schedule'; render(); }
  else if(t.dataset.dupWeek){ openNewWeekModal(t.dataset.dupWeek); }
  else if(t.dataset.delWeek){ if(Object.keys(state.weeks).length<=1){ alert('At least one week must remain.'); return; }
    if(confirm('Delete the week of '+fmtRange(t.dataset.delWeek)+'? This cannot be undone.')){
      delete state.weeks[t.dataset.delWeek];
      if(state.currentWeek===t.dataset.delWeek) state.currentWeek=Object.keys(state.weeks).sort().reverse()[0];
      persist(); render(); } }
  else if(t.dataset.exportWeek){ download('schedule-week-'+t.dataset.exportWeek+'.json', JSON.stringify({[t.dataset.exportWeek]:state.weeks[t.dataset.exportWeek]},null,1)); }
  else if(t.id==='btnExportAll'){ download('schedule-app-backup-'+isoDate(new Date())+'.json', JSON.stringify(state,null,1)); }
  else if(t.id==='btnImport'){ document.getElementById('fileImport').click(); }
  else if(t.id==='btnNewWeek'){ openNewWeekModal(); }
  else if(t.id==='btnPrint'){ buildPrint(); window.print(); }
  else if(t.id==='btnCsv'){ exportCsv(); }
  else if(t.id==='btnReset'){ if(confirm('Reset ALL data back to the original Excel import? All edits and saved weeks will be lost.')){ localStorage.removeItem(LS_KEY); load(); render(); } }
  else if(t.dataset.ovrEdit){ ui.editingOvr[t.dataset.ovrEdit]=true; render(); }
  else if(t.dataset.ovrReset){ const m=week().metrics; if(m.ovr) delete m.ovr[t.dataset.ovrReset]; delete ui.editingOvr[t.dataset.ovrReset]; persist(); render(); }
});
document.addEventListener('change', e=>{
  const t = e.target;
  if(t.id==='weekSel'){ state.currentWeek=t.value; persist(); render(); }
  else if(t.dataset.emp!=null){
    const emp = state.employees[+t.dataset.emp], f=t.dataset.f;
    const old = emp.name;
    if(f==='active') emp.active=t.checked; else emp[f]=t.value;
    if(f==='name' && old!==t.value){
      // propagate rename through all saved schedules
      Object.values(state.weeks).forEach(w=>Object.values(w.schedule).forEach(g=>g.forEach(sh=>sh.forEach(day=>day.forEach(sl=>{ if(sl.emp===old) sl.emp=t.value; })))));
    }
    persist(); if(f==='active'||f==='name') render();
  }
  else if(t.dataset.metric){ const m=week().metrics; m[t.dataset.metric]=t.value; persist(); render(); }
  else if(t.dataset.ovr){ const m=week().metrics; m.ovr=m.ovr||{}; m.ovr[t.dataset.ovr]=t.value; delete ui.editingOvr[t.dataset.ovr]; persist(); render(); }
  else if(t.dataset.setting){ state.settings[t.dataset.setting]=t.value; persist(); render(); }
  else if(t.dataset.pphdr!=null){ state.printPages[+t.dataset.pphdr].header=t.value; persist(); }
  else if(t.dataset.unit!=null){
    const u = state.units[+t.dataset.unit];
    if(t.dataset.shift!=null) u.shifts[+t.dataset.shift][t.dataset.f]=t.value;
    else if(t.dataset.f==='group') u.group=t.value;
    else if(t.dataset.f==='ppage'){
      state.printPages.forEach(p=>{ const ix=p.units.indexOf(u.id); if(ix>-1) p.units.splice(ix,1); });
      if(t.value!=='') state.printPages[+t.value].units.push(u.id);
    }
    else u[t.dataset.f]=t.value;
    persist();
  }
  else if(t.id==='fileImport'){
    const f=t.files[0]; if(!f) return;
    f.text().then(txt=>{
      try{
        const data = JSON.parse(txt);
        if(data.weeks && data.employees){ if(confirm('Full backup detected. Replace ALL current data with this backup?')){ state=data; persist(); render(); } }
        else{ let n=0; Object.keys(data).forEach(k=>{ if(/^\d{4}-\d{2}-\d{2}$/.test(k) && data[k].schedule){ state.weeks[k]=data[k]; n++; } });
          persist(); render(); alert(n+' week(s) imported.'); }
      }catch(err){ alert('Could not read that file: '+err.message); }
      t.value='';
    });
  }
});
window.addEventListener('scroll', closePop, true);

/* ---------- boot ---------- */
load();
render();
</script>
</body>
</html>
